<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eeshan's projects</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23222'/><text x='50' y='68' font-family='Georgia,serif' font-size='60' font-style='italic' fill='%23f5f5f5' text-anchor='middle'>e</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script>if(localStorage.getItem('theme-eeshan')!=='light')document.documentElement.className='dark'</script>
</head>
<body>
    <header>
        <h1>eeshan's projects</h1>
        <nav>
            <button class="view-btn active" data-view="category">Category</button>
            <button class="view-btn" data-view="timeline">Timeline</button>
            <button class="theme-btn" onclick="document.documentElement.classList.toggle('dark');var d=document.documentElement.classList.contains('dark');this.innerHTML=d?'<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;18&quot; height=&quot;18&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;5&quot;/><line x1=&quot;12&quot; y1=&quot;1&quot; x2=&quot;12&quot; y2=&quot;3&quot;/><line x1=&quot;12&quot; y1=&quot;21&quot; x2=&quot;12&quot; y2=&quot;23&quot;/><line x1=&quot;4.22&quot; y1=&quot;4.22&quot; x2=&quot;5.64&quot; y2=&quot;5.64&quot;/><line x1=&quot;18.36&quot; y1=&quot;18.36&quot; x2=&quot;19.78&quot; y2=&quot;19.78&quot;/><line x1=&quot;1&quot; y1=&quot;12&quot; x2=&quot;3&quot; y2=&quot;12&quot;/><line x1=&quot;21&quot; y1=&quot;12&quot; x2=&quot;23&quot; y2=&quot;12&quot;/><line x1=&quot;4.22&quot; y1=&quot;19.78&quot; x2=&quot;5.64&quot; y2=&quot;18.36&quot;/><line x1=&quot;18.36&quot; y1=&quot;5.64&quot; x2=&quot;19.78&quot; y2=&quot;4.22&quot;/></svg>':'<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;18&quot; height=&quot;18&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z&quot;/></svg>';localStorage.setItem('theme-eeshan',d?'dark':'light')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </nav>
    </header>
    <main id="projects"></main>
    <script>
        // Add projects here: { name, url, date, category, byline }
        var projects = [
            { name: "Vibe Who", url: "vibewho", date: "2026-03-24", category: "social-games", byline: "Guessing game based on vibes and stereotypes" },
            { name: "Startups Against Humanity", url: "startups-against-humanity", date: "2026-01-17", category: "social-games", byline: "Pitch terrible startups to attract imaginary capital" },
            { name: "Hodorle", url: "hodorle", date: "2022-01-03", category: "1p-games", byline: "A word game in the loosest sense" },
            { name: "Countdown Letters", url: "letters-practice", date: "2026-03-30", category: "1p-games", byline: "Practice tool for the Countdown letter game" },
            { name: "Things in Rings", url: "things-in-rings", date: "2026-04-05", category: "social-games", byline: "Social deduction game with Venn diagrams" },
            { name: "Backtrack", url: "backtrack", date: "2026-04-10", category: "social-games", byline: "A party game where everything sounds better in reverse" },
        ];

        var container = document.getElementById('projects');
        var buttons = document.querySelectorAll('.view-btn');

        function renderTimeline() {
            var sorted = projects.slice().sort(function(a, b) { return b.date.localeCompare(a.date); });
            container.innerHTML = '<ul class="timeline">' +
                sorted.map(function(p) {
                    return '<li><span class="date">' + p.date + '</span><a href="' + p.url + '">' + p.name + '</a><a href="' + p.url + '" class="byline">' + p.byline + '</a></li>';
                }).join('') + '</ul>';
        }

        function renderCategory() {
            var groups = {};
            projects.forEach(function(p) {
                (groups[p.category] = groups[p.category] || []).push(p);
            });
            container.innerHTML = Object.keys(groups).sort().map(function(cat) {
                var items = groups[cat].slice().sort(function(a, b) { return b.date.localeCompare(a.date); });
                return '<section><h2>' + cat + '</h2><ul class="category-list">' +
                    items.map(function(p) {
                        return '<li><a href="' + p.url + '">' + p.name + '</a><a href="' + p.url + '" class="byline">' + p.byline + '</a></li>';
                    }).join('') + '</ul></section>';
            }).join('');
        }

        function setView(view) {
            buttons.forEach(function(b) { b.classList.toggle('active', b.dataset.view === view); });
            if (view === 'timeline') renderTimeline(); else renderCategory();
        }

        buttons.forEach(function(b) { b.addEventListener('click', function() { setView(b.dataset.view); }); });
        setView('category');
        if(localStorage.getItem('theme-eeshan')!=='light') document.querySelector('.theme-btn').innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    </script>
    <script data-goatcounter="https://cakester.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
